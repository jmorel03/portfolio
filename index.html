<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <section class="card" aria-labelledby="login-heading">
      <h1 id="login-heading">Access Code</h1>
      <p class="lead">Enter your 4-digit code to continue</p>

      <form id="login-form" class="login-form" novalidate>
        <label for="code">4-Digit Code</label>
        <input id="code" name="code" type="password" inputmode="numeric" pattern="[0-9]{4}" maxlength="4" required autocomplete="off" placeholder="••••">

        <div id="message" role="status" class="message" aria-live="polite"></div>

        <button type="submit" class="btn">Unlock</button>
      </form>
    </section>
  </main>
  <div id="timestamp" class="timestamp"></div>
  <script src="script.js"></script>
  <script>
    async function loadVersionInfo() {
      try {
        const response = await fetch('/api/version');
        const data = await response.json();
        if (data.timestamp) {
          const date = new Date(data.timestamp);
          const formatted = date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
          document.getElementById('timestamp').textContent = `v${data.hash} • ${formatted}`;
        }
      } catch (error) {
        console.error('Failed to load version info:', error);
      }
    }
    loadVersionInfo();
  </script>
</body>
</html>
