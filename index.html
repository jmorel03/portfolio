<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <section class="card" aria-labelledby="login-heading">
      <h1 id="login-heading">Access Code</h1>
      <p class="lead">Enter your 4-digit code to continue</p>

      <form id="login-form" class="login-form" novalidate>
        <label for="code">4-Digit Code</label>
        <input id="code" name="code" type="password" inputmode="numeric" pattern="[0-9]{4}" maxlength="4" required autocomplete="off" placeholder="••••">

        <div id="message" role="status" class="message" aria-live="polite"></div>

        <button type="submit" class="btn">Unlock</button>
        <button type="button" id="visitorAccessBtn" class="btn btn-secondary">Visitor Access</button>
      </form>
    </section>
  </main>
  <div id="timestamp" class="timestamp"></div>
  <script src="script.js"></script>
  <script>
    function formatUpdateStamp(value) {
      const parsed = new Date(value);
      if (Number.isNaN(parsed.getTime())) {
        return null;
      }

      return parsed.toLocaleString('en-US', {
        year: 'numeric',
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    async function loadVersionInfo() {
      const stampEl = document.getElementById('timestamp');
      try {
        const response = await fetch('/api/version');
        if (!response.ok) {
          throw new Error(`Version API returned ${response.status}`);
        }

        const data = await response.json();
        const formatted = formatUpdateStamp(data?.timestamp) || formatUpdateStamp(document.lastModified);
        const hash = String(data?.hash || 'local').slice(0, 12);

        if (formatted) {
          stampEl.textContent = `Latest update: ${formatted} • v${hash}`;
          return;
        }

        stampEl.textContent = `Latest update: v${hash}`;
      } catch (error) {
        console.error('Failed to load version info:', error);

        const fallback = formatUpdateStamp(document.lastModified);
        if (fallback) {
          stampEl.textContent = `Latest update: ${fallback}`;
        } else {
          stampEl.textContent = 'Latest update unavailable';
        }
      }
    }
    loadVersionInfo();
  </script>
</body>
</html>
