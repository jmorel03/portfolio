<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Highlights</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      color: #1f2937;
      padding: 24px;
    }
    .container { max-width: 980px; margin: 0 auto; }
    .header {
      background: rgba(255,255,255,0.95);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    h1 { color: #4338ca; font-size: 2rem; }
    .hint { color: #64748b; margin-top: 6px; }
    .btn {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      cursor: pointer;
      font-weight: 600;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }
    .grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    }
    .card {
      background: rgba(255,255,255,0.95);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      border: 1px solid rgba(255,255,255,0.5);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .card h3 { color: #312e81; }
    .card p { color: #475569; min-height: 40px; }
    .empty {
      background: rgba(255,255,255,0.95);
      border-radius: 14px;
      padding: 18px;
      color: #64748b;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }
    @media (max-width: 700px) {
      .header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>Portfolio Highlights</h1>
        <p class="hint">Visitor view of featured links selected by the admin.</p>
      </div>
      <button class="btn" onclick="window.location.href='/'">Back to Login</button>
    </div>

    <div id="highlightsGrid" class="grid"></div>
  </div>

  <script>
    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    async function loadHighlights() {
      const grid = document.getElementById('highlightsGrid');
      try {
        const response = await fetch('/api/highlights');
        const result = await response.json();
        const items = Array.isArray(result?.items) ? result.items : [];

        if (!items.length) {
          grid.innerHTML = '<div class="empty">No highlights are available yet.</div>';
          return;
        }

        grid.innerHTML = items.map((item) => {
          const title = escapeHtml(item.title || 'Untitled');
          const description = escapeHtml(item.description || '');
          const url = escapeHtml(item.url || '#');
          return `<article class="card"><h3>${title}</h3><p>${description || 'No description provided.'}</p><a class="btn" href="${url}" target="_blank" rel="noopener noreferrer">Open</a></article>`;
        }).join('');
      } catch (error) {
        console.error('Failed to load highlights:', error);
        grid.innerHTML = '<div class="empty">Unable to load highlights right now.</div>';
      }
    }

    document.addEventListener('DOMContentLoaded', loadHighlights);
  </script>
</body>
</html>
