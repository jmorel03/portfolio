<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thread / Blog - Portfolio</title>
  <link rel="stylesheet" href="/chat-widget.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      color: #1f2937;
      padding: 24px;
    }
    .container { max-width: 980px; margin: 0 auto; }
    .header, .section {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 14px;
      padding: 22px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      margin-bottom: 14px;
    }
    .header { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .header h1 { color: #4338ca; font-size: 2rem; }
    .hint { color: #64748b; margin-top: 6px; }
    .btn {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
    .btn-secondary { background: #e2e8f0; color: #334155; }
    .input, textarea {
      width: 100%;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 1rem;
      background: #fff;
      margin-bottom: 10px;
    }
    textarea { min-height: 130px; resize: vertical; }
    .posts { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .posts li {
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      background: #f8fafc;
      padding: 14px;
    }
    .post-title { color: #312e81; font-weight: 700; margin-bottom: 6px; }
    .post-meta { color: #64748b; font-size: 0.88rem; margin-bottom: 8px; }
    .post-meta-line {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .role-badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 2px 10px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      line-height: 1.5;
    }
    .role-badge.role-admin {
      background: #ffedd5;
      color: #c2410c;
    }
    .role-badge.role-editor {
      background: #ccfbf1;
      color: #0f766e;
    }
    .role-badge.role-viewer {
      background: #e0e7ff;
      color: #4338ca;
    }
    .post-content { white-space: pre-wrap; line-height: 1.4; }
    .message { padding: 10px 12px; border-radius: 10px; display: none; margin-bottom: 10px; }
    .error { background: #fee2e2; color: #991b1b; }
    .success { background: #dcfce7; color: #166534; }
    .hidden { display: none; }
    @media (max-width: 760px) {
      .header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>Thread / Blog</h1>
        <p class="hint">Admins and Editors can post updates. Viewers can read posts.</p>
      </div>
      <button class="btn btn-primary" onclick="window.location.href='/pages/main.html'">← Back to Portfolio</button>
    </div>

    <div id="successMessage" class="message success"></div>
    <div id="errorMessage" class="message error"></div>

    <div id="postComposer" class="section hidden">
      <h2 style="color:#4f46e5;margin-bottom:10px;">Create Post</h2>
      <input id="postTitle" class="input" placeholder="Title (optional)">
      <textarea id="postContent" placeholder="Write your post..."></textarea>
      <button id="publishPostBtn" class="btn btn-primary">Publish</button>
    </div>

    <div class="section">
      <h2 style="color:#4f46e5;margin-bottom:10px;">Recent Posts</h2>
      <ul id="threadPostsList" class="posts"><li>Loading posts...</li></ul>
    </div>
  </div>

  <script>
    let currentUserRole = 'viewer';

    function showSuccess(message) {
      const successEl = document.getElementById('successMessage');
      const errorEl = document.getElementById('errorMessage');
      successEl.textContent = message;
      successEl.style.display = 'block';
      errorEl.style.display = 'none';
      setTimeout(() => { successEl.style.display = 'none'; }, 3500);
    }

    function showError(message) {
      const errorEl = document.getElementById('errorMessage');
      const successEl = document.getElementById('successMessage');
      errorEl.textContent = message;
      errorEl.style.display = 'block';
      successEl.style.display = 'none';
      setTimeout(() => { errorEl.style.display = 'none'; }, 4500);
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function canPost(role) {
      const normalized = String(role || '').toLowerCase();
      return normalized === 'admin' || normalized === 'editor';
    }

    function roleBadgeClass(role) {
      const normalized = String(role || '').toLowerCase();
      if (normalized === 'admin') return 'role-admin';
      if (normalized === 'editor') return 'role-editor';
      return 'role-viewer';
    }

    function roleLabel(role) {
      const normalized = String(role || '').toLowerCase();
      if (!normalized) return 'Viewer';
      return normalized.charAt(0).toUpperCase() + normalized.slice(1);
    }

    async function loadCurrentUser() {
      const response = await fetch('/api/me', { credentials: 'include' });
      if (!response.ok) {
        window.location.href = '/';
        return null;
      }

      const result = await response.json();
      currentUserRole = String(result?.user?.role || 'viewer').toLowerCase();
      const postComposer = document.getElementById('postComposer');
      postComposer.classList.toggle('hidden', !canPost(currentUserRole));
      return result?.user || null;
    }

    function renderPosts(posts) {
      const list = document.getElementById('threadPostsList');
      const entries = Array.isArray(posts) ? posts : [];

      if (!entries.length) {
        list.innerHTML = '<li>No posts yet.</li>';
        return;
      }

      list.innerHTML = entries.map((post) => {
        const title = escapeHtml(post.title || 'Untitled post');
        const author = escapeHtml(post.author || 'Unknown user');
        const role = String(post.role || 'viewer').toLowerCase();
        const roleClass = roleBadgeClass(role);
        const roleText = escapeHtml(roleLabel(role));
        const content = escapeHtml(post.content || '');
        const createdAt = post.createdAt ? new Date(post.createdAt).toLocaleString() : 'Unknown time';
        return `<li><div class="post-title">${title}</div><div class="post-meta"><div class="post-meta-line"><span>${author}</span><span class="role-badge ${roleClass}">${roleText}</span><span>${createdAt}</span></div></div><div class="post-content">${content}</div></li>`;
      }).join('');
    }

    async function loadPosts() {
      const list = document.getElementById('threadPostsList');
      try {
        const response = await fetch('/api/thread-posts', { credentials: 'include' });
        const result = await response.json();

        if (!response.ok) {
          list.innerHTML = '<li>Unable to load posts.</li>';
          return;
        }

        renderPosts(result.posts || []);
      } catch (error) {
        console.error('Error loading posts:', error);
        list.innerHTML = '<li>Unable to load posts.</li>';
      }
    }

    async function publishPost() {
      if (!canPost(currentUserRole)) {
        showError('Only Admins and Editors can post.');
        return;
      }

      const title = document.getElementById('postTitle').value.trim();
      const content = document.getElementById('postContent').value.trim();

      if (!content) {
        showError('Post content is required.');
        return;
      }

      try {
        const response = await fetch('/api/thread-posts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ title, content })
        });

        const result = await response.json();
        if (!response.ok) {
          showError(result.error || 'Failed to publish post.');
          return;
        }

        document.getElementById('postTitle').value = '';
        document.getElementById('postContent').value = '';
        renderPosts(result.posts || []);
        showSuccess('Post published.');
      } catch (error) {
        console.error('Error publishing post:', error);
        showError('Network error while publishing post.');
      }
    }

    document.getElementById('publishPostBtn').addEventListener('click', publishPost);

    document.addEventListener('DOMContentLoaded', async () => {
      await loadCurrentUser();
      await loadPosts();
    });
  </script>
  <script src="/chat-widget.js"></script>
</body>
</html>
