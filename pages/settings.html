<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings - Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #667eea;
            font-size: 2.5rem;
            font-weight: 700;
        }

        .back-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .settings-section {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .settings-section h2 {
            color: #667eea;
            font-size: 1.8rem;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }

        .setting-group {
            margin-bottom: 25px;
        }

        .setting-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
        }

        .setting-group input,
        .setting-group select,
        .setting-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e1e1;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
        }

        .setting-group input:focus,
        .setting-group select:focus,
        .setting-group textarea:focus {
            outline: none;
            border-color: #667eea;
            background: white;
        }

        .setting-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
            margin: 0;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #666;
            border: 2px solid #e1e1e1;
        }

        .btn-secondary:hover {
            background: #e9ecef;
            border-color: #adb5bd;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a52 100%);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .danger-section {
            border-left: 4px solid #ff6b6b;
            background: rgba(255, 107, 107, 0.05);
        }

        .success-message {
            background: rgba(40, 167, 69, 0.1);
            color: #28a745;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid rgba(40, 167, 69, 0.2);
            display: none;
        }

        .error-message {
            background: rgba(220, 53, 69, 0.1);
            color: #dc3545;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid rgba(220, 53, 69, 0.2);
            display: none;
        }

        .form-row {
            display: flex;
            gap: 20px;
        }

        .form-row .setting-group {
            flex: 1;
        }

        @media (max-width: 768px) {
            .form-row {
                flex-direction: column;
            }

            .btn-group {
                flex-direction: column;
            }

            .header {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Account Settings</h1>
            <a href="/pages/main.html" class="back-btn">← Back to Portfolio</a>
        </div>

        <div id="successMessage" class="success-message">
            Settings saved successfully!
        </div>

        <div id="errorMessage" class="error-message">
            Error saving settings. Please try again.
        </div>

        <div class="settings-section">
            <h2>Access Code</h2>

            <div class="setting-group">
                <label for="currentCode">Current Access Code</label>
                <input type="password" id="currentCode" placeholder="Enter current 4-digit code" maxlength="4" pattern="\d{4}">
            </div>

            <div class="form-row">
                <div class="setting-group">
                    <label for="newCode">New Access Code</label>
                    <input type="password" id="newCode" placeholder="Enter new 4-digit code" maxlength="4" pattern="\d{4}">
                </div>

                <div class="setting-group">
                    <label for="confirmCode">Confirm New Access Code</label>
                    <input type="password" id="confirmCode" placeholder="Confirm new 4-digit code" maxlength="4" pattern="\d{4}">
                </div>
            </div>

            <div class="setting-group checkbox-group">
                <input type="checkbox" id="twoFactor">
                <label for="twoFactor">Enable two-factor authentication</label>
            </div>
        </div>

        <div class="settings-section danger-section">
            <h2>Danger Zone</h2>

            <div class="setting-group">
                <p style="color: #666; margin-bottom: 15px;">
                    These actions cannot be undone. Please be certain before proceeding.
                </p>

                <div class="btn-group">
                    <button class="btn btn-danger" id="deleteAllData">Delete All Portfolio Data</button>
                    <button class="btn btn-danger" id="deleteAccount">Delete Account</button>
                </div>
            </div>
        </div>

        <div class="settings-section">
            <div class="btn-group">
                <button class="btn btn-primary" id="saveSettings">Save Settings</button>
                <button class="btn btn-secondary" id="resetSettings">Reset to Defaults</button>
            </div>
        </div>
    </div>

    <script>
        // Load current settings
        document.addEventListener('DOMContentLoaded', function() {
            loadSettings();
        });

        // Save settings
        document.getElementById('saveSettings').addEventListener('click', function() {
            saveSettings();
        });

        // Reset settings
        document.getElementById('resetSettings').addEventListener('click', function() {
            if (confirm('Are you sure you want to reset all settings to defaults?')) {
                resetSettings();
            }
        });

        // Delete all data
        document.getElementById('deleteAllData').addEventListener('click', function() {
            if (confirm('Are you sure you want to delete ALL portfolio data? This action cannot be undone!')) {
                if (confirm('This is your final warning. All folders, files, and data will be permanently deleted. Continue?')) {
                    deleteAllData();
                }
            }
        });

        // Delete account
        document.getElementById('deleteAccount').addEventListener('click', function() {
            if (confirm('Are you sure you want to delete your account? This will permanently delete everything and log you out.')) {
                if (confirm('This action cannot be undone. Your account and all data will be lost forever. Continue?')) {
                    deleteAccount();
                }
            }
        });

        function loadSettings() {
            // Load settings from localStorage
            const settings = JSON.parse(localStorage.getItem('userSettings')) || getDefaultSettings();

            document.getElementById('twoFactor').checked = settings.twoFactor || false;
        }

        function saveSettings() {
            const currentCode = document.getElementById('currentCode').value.trim();
            const newCode = document.getElementById('newCode').value.trim();
            const confirmCode = document.getElementById('confirmCode').value.trim();

            // If user is trying to change access code
            if (newCode) {
                // Validate current code (we can't actually check it on client side, but we can validate format)
                if (!/^\d{4}$/.test(currentCode)) {
                    showError('Current access code must be 4 digits!');
                    return;
                }

                if (!/^\d{4}$/.test(newCode)) {
                    showError('New access code must be 4 digits!');
                    return;
                }

                if (newCode !== confirmCode) {
                    showError('New access codes do not match!');
                    return;
                }

                // Here we would typically send to server, but for now we'll just show success
                // In a real implementation, this would make an API call to change the access code
                showSuccess('Access code updated successfully! You will need to use the new code to log in next time.');

                // Clear code fields
                document.getElementById('currentCode').value = '';
                document.getElementById('newCode').value = '';
                document.getElementById('confirmCode').value = '';
                return;
            }

            // Save other settings
            const settings = {
                twoFactor: document.getElementById('twoFactor').checked,
                lastUpdated: new Date().toISOString()
            };

            // Save to localStorage
            localStorage.setItem('userSettings', JSON.stringify(settings));

            showSuccess('Settings saved successfully!');
        }

        function resetSettings() {
            const defaults = getDefaultSettings();
            localStorage.setItem('userSettings', JSON.stringify(defaults));
            loadSettings();
            showSuccess('Settings reset to defaults!');
        }

        function deleteAllData() {
            if (confirm('Final confirmation: Delete ALL folders and files?')) {
                localStorage.removeItem('folders');
                localStorage.removeItem('userSettings');
                showSuccess('All portfolio data has been deleted.');
                setTimeout(() => {
                    window.location.href = '/pages/main.html';
                }, 2000);
            }
        }

        function deleteAccount() {
            // Clear all user data
            localStorage.clear();
            sessionStorage.clear();

            // Redirect to logout
            fetch('/api/logout', { method: 'POST' })
                .then(() => {
                    window.location.href = '/';
                })
                .catch(() => {
                    window.location.href = '/';
                });
        }

        function getDefaultSettings() {
            return {
                twoFactor: false
            };
        }

        function showSuccess(message) {
            const successEl = document.getElementById('successMessage');
            successEl.textContent = message;
            successEl.style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';

            setTimeout(() => {
                successEl.style.display = 'none';
            }, 5000);
        }

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
            document.getElementById('successMessage').style.display = 'none';

            setTimeout(() => {
                errorEl.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
